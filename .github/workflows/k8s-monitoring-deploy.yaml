name: k8s-monitoring-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - k8sevents-values.yaml
      - kubeletstats-values.yaml
      - .github/workflows/k8s-monitoring-deploy.yaml

env:
  HONEYCOMB_REFINERY_TELEMETRY_API_ENDPOINT: ${{ vars.HONEYCOMB_REFINERY_TELEMETRY_API_ENDPOINT }}
permissions:
  id-token: write # This is required for requesting the JWT

jobs:
  k8s-monitoring-deploy:
    # don't run when creating the repo from this template
    if: github.run_number != 1
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: us-east-1
            cluster: raas-us1
            eks_role_secret: AWS_GH_EKS_ROLE_US1
          - region: eu-west-1
            cluster: raas-eu1
            eks_role_secret: AWS_GH_EKS_ROLE_EU1
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.eks_role_secret] }}
          role-session-name: ci-run-${{ github.run_id }}
          aws-region: ${{ matrix.region }}

      - name: kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ matrix.cluster }} --region ${{ matrix.region }}  --kubeconfig ./kubeconfig
          echo 'KUBE_CONFIG_DATA<<EOF' >> $GITHUB_ENV
          echo $(cat ./kubeconfig | base64) >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      - name: k8s manifest deploy
        uses: koslib/helm-eks-action@master
        env:
          KUBE_CONFIG_DATA: ${{ env.KUBE_CONFIG_DATA }}
        with:
          command: |
            helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
            helm repo update

            helm upgrade \
              -n ${{ vars.K8S_NAMESPACE }} \
              --install ${{ vars.K8S_NAMESPACE }}-otelcol-kubeletstats \
              open-telemetry/opentelemetry-collector \
              -f kubeletstats-values.yaml \
              --set config.exporters.otlp.endpoint="${{ env.HONEYCOMB_REFINERY_TELEMETRY_API_ENDPOINT }}:443" \
              --wait \
              --debug

            helm upgrade \
              -n ${{ vars.K8S_NAMESPACE }} \
              --install ${{ vars.K8S_NAMESPACE }}-otelcol-k8sevents \
              open-telemetry/opentelemetry-collector \
              -f k8sevents-values.yaml \
              --set config.exporters.otlp.endpoint="${{ env.HONEYCOMB_REFINERY_TELEMETRY_API_ENDPOINT }}:443" \
              --wait \
              --debug
